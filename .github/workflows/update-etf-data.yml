name: Aggiornamento dati ETF

# Esegue lo scraper delle metriche una volta al giorno e committa il JSON aggiornato.
# Il push fa scattare il redeploy automatico su Vercel con i dati freschi.
on:
  schedule:
    - cron: '0 6 * * *'   # ogni giorno alle 06:00 UTC (~07:00/08:00 in Italia)
  workflow_dispatch:       # permette l'esecuzione manuale dal tab Actions

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Aggiorna metriche ETF
        run: node scripts/update-etf-data.mjs

      - name: Commit e push se ci sono modifiche
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/etfs.json
          if git diff --staged --quiet; then
            echo "Nessuna modifica ai dati."
          else
            git commit -m "chore: aggiornamento automatico dati ETF ($(date -u +%Y-%m-%d))"
            git push
          fi
